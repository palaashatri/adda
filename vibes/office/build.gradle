project(':modules:apps:aurora-launcher') {
    apply plugin: 'application'

    application {
        mainClass = 'com.aurora.launcher.AuroraLauncherApp'
        applicationDefaultJvmArgs = [
                '-Dprism.order=metal,sw',
                '-Dapple.awt.application.name=Aurora Office'
        ]
    }

    dependencies {
        implementation project(':modules:platform:aurora-platform-ai')
        implementation project(':modules:platform:aurora-platform-core')
        implementation project(':modules:platform:aurora-platform-docmodel')
        implementation project(':modules:platform:aurora-platform-plugins')
        implementation project(':modules:platform:aurora-platform-storage')
        implementation project(':modules:platform:aurora-platform-ui')
        implementation project(':modules:formats:aurora-format-native')
        implementation project(':modules:formats:aurora-format-pdf')
        implementation project(':modules:formats:aurora-format-docx')
        implementation project(':modules:formats:aurora-format-xlsx')
        implementation project(':modules:formats:aurora-format-pptx')
        implementation project(':modules:apps:aurora-write')
        implementation project(':modules:apps:aurora-sheet')
        implementation project(':modules:apps:aurora-deck')
    }
